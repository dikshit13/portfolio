<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="gitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#333333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle for visibility -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
  
  <!-- GitHub Octocat icon -->
  <g transform="translate(64, 64)">
    <!-- Head -->
    <circle cx="0" cy="-8" r="8" fill="url(#gitGradient)"/>
    
    <!-- Body -->
    <path d="M -6 0 L -8 12 L -4 16 L 4 16 L 8 12 L 6 0 Z" fill="url(#gitGradient)"/>
    
    <!-- Left arm with tentacle -->
    <path d="M -6 2 Q -14 0 -16 8" stroke="url(#gitGradient)" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Right arm with tentacle -->
    <path d="M 6 2 Q 14 0 16 8" stroke="url(#gitGradient)" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Left leg -->
    <path d="M -4 16 L -6 24" stroke="url(#gitGradient)" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Right leg -->
    <path d="M 4 16 L 6 24" stroke="url(#gitGradient)" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Eyes -->
    <circle cx="-2" cy="-10" r="1.5" fill="#ffffff"/>
    <circle cx="2" cy="-10" r="1.5" fill="#ffffff"/>
    
    <!-- Mouth -->
    <path d="M -2 -6 Q 0 -5 2 -6" stroke="#ffffff" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>
</svg>